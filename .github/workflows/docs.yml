name: Documentation

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-docs:
    name: Deploy Documentation
    runs-on: macos-26
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Generate Documentation
        run: |
          swift package \
            --allow-writing-to-directory .docs \
            generate-documentation \
            --target Math \
            --target MathOperators \
            --target Calculus \
            --target RungeKutta \
            --target RealNumber \
            --target SwiftCalx \
            --enable-experimental-combined-documentation \
            --output-path .docs \
            --transform-for-static-hosting \
            --hosting-base-path SwiftCalx

      - name: Redirect site root to /documentation/
        run: |
          cat > .docs/index.html <<'EOF'
          <!doctype html>
          <meta http-equiv="refresh" content="0; url=./documentation/">
          <link rel="canonical" href="./documentation/">
          <title>SwiftCalx — Documentation</title>
          <a href="./documentation/">Redirecting to documentation…</a>
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .docs

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v5
