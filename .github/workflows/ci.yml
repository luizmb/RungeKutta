name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-macos-accelerate:
    name: Build & Test (macOS / Accelerate)
    runs-on: macos-26
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Cache Mint packages
        uses: actions/cache@v5
        with:
          path: ~/.mint
          key: ${{ runner.os }}-mint-${{ hashFiles('Mintfile') }}
          restore-keys: ${{ runner.os }}-mint-

      - name: Cache Homebrew downloads
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-homebrew-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: ${{ runner.os }}-homebrew-

      - name: Install Mint
        run: brew install mint

      - name: Install Periphery
        run: brew install peripheryapp/periphery/periphery

      - name: Install SwiftLint
        run: mint bootstrap

      - name: Lint
        run: mint run swiftlint lint --strict

      - name: Build
        run: swift build 2>&1

      - name: Test
        run: swift test 2>&1

      - name: Periphery
        run: periphery scan

  test-macos-fallback:
    name: Build & Test (macOS / scalar fallback)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Build (-D SWIFTCALX_NO_ACCELERATE)
        run: swift build -Xswiftc -DSWIFTCALX_NO_ACCELERATE 2>&1

      - name: Test (-D SWIFTCALX_NO_ACCELERATE)
        run: swift test -Xswiftc -DSWIFTCALX_NO_ACCELERATE 2>&1

  test-linux-openblas:
    name: Build & Test (Linux / OpenBLAS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Install OpenBLAS
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev pkg-config

      - name: Build
        run: swift build 2>&1

      - name: Test
        run: swift test 2>&1

  test-linux-scalar:
    name: Build & Test (Linux / scalar fallback)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Build
        run: swift build 2>&1

      - name: Test
        run: swift test 2>&1
